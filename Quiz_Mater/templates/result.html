<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Your Score</h1>
        <h2>{{ score }} / {{ total }}</h2>

        {% if score == total %}
            <p>Excellent! 🎉</p>
        {% elif score >= 3 %}
            <p>Good Job 👍</p>
        {% else %}
            <p>Try Again 😅</p>
        {% endif %}

        <a href="/"><button>Restart</button></a>
    </div>
</body>
</html>
