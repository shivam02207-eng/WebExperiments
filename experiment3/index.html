

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactive Quiz</h1>
        <p>Test your knowledge with this simple multiple-choice quiz!</p>
    </header>

    <main>
    
        <section id="quiz-container">
            <h2 id="question">Question text appears here</h2>

            <div id="options">
        
            </div>

            <button id="next-btn">Next</button>
        </section>

        <section id="result-container" class="hidden">
            <h2>Your Result</h2>
            <p id="score-text"></p>
            <p id="message"></p>
            <button id="restart-btn">Restart Quiz</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
